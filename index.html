<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Ring Road</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
      }
    </style>
  </head>
  <body>
    <noscript>This game requires JavaScript to run.</noscript>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
      const { useState, useEffect, useMemo, useCallback, useRef } = React;

      // ===== Core configuration =====
      const RING_COUNT = 7;
      const OUTER_RING_INDICES = [1, 2, 3, 4, 5, 6];
      const CENTER_RING_INDEX = 0;
      const FIRST_OUTER_RING_INDEX = 1;
      const MAX_CENTER_RING_CYCLE = 5;
      const MAX_FIRST_OUTER_RING_CYCLE = 11;
      const MAX_REMAINING_OUTER_RING_CYCLE = 19;

      const DEV_VALIDATION = typeof window !== "undefined" && ["localhost", "127.0.0.1"].includes(window.location.hostname);
      const DEBUG_DIAGNOSTICS = DEV_VALIDATION;

      // ===== SVG icon helpers =====
      const RotateCcwIcon = ({ color }) => (
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
          <path d="M3 3v5h5" />
        </svg>
      );

      const RotateCwIcon = ({ color }) => (
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
          <path d="M21 3v5h-5" />
        </svg>
      );

      const UndoIcon = () => (
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M9 14 4 9l5-5" />
          <path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11" />
        </svg>
      );

      const XIcon = () => (
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.25" strokeLinecap="round" strokeLinejoin="round">
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </svg>
      );

      const InfoIcon = () => (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="16" x2="12" y2="12" />
          <line x1="12" y1="8" x2="12.01" y2="8" />
        </svg>
      );

      // Level-authoring workflow (construct from intended solution first, not from random starts):
      //   1) Pick legal prime-only ring cycle counts.
      //   2) Pick a shared solved spoke `s` that every ring can align to.
      //   3) Choose the intended exact directed move allocation per ring (direction + moveCount).
      //   4) For each ring, choose a target state `t` that maps to spoke `s`, then derive initial from `t` and intended moveCount `m`:
      //        - intended CW  => initial = (t - m) mod cycleLength
      //        - intended CCW => initial = (t + m) mod cycleLength
      //   5) Set targetMoves to the sum of intended per-ring moveCount values.
      //   6) Run solver validation and inspect exact-solution-vector count / ambiguity diagnostics.
      //
      // Prime relationships are intentionally constrained, so exact-vector uniqueness checks matter.
      //
      // Over-360 is an intended design tool:
      // - A valid directed move can be baseDirectionalDistance + k * cycleLength, with k >= 1 for wrapped plans.
      // - Wraps are continuous one-direction movement on the same ring.
      // - Preferred handcrafted levels should have exactly one exact intended solution vector.
      // - Multiple exact vectors are a design warning unless that ambiguity is explicitly intentional.
      // - Uniqueness is judged by full per-ring move allocation (targetState + direction + moveCount + wraps), not only final alignment.
      //
      // Practical wrap-level heuristic (guideline, not a rule):
      // - Start from a clean exact intended vector, then add one full-turn wrap to one ring by default.
      // - Prefer a ring with a small/moderate base directional distance; small-cycle rings are often strong candidates.
      // - Keep targetMoves only modestly above the no-wrap minimum so the wrapped move is structurally required, not decorative.
      // - One wrapped ring is usually more readable than many; always recheck exact-vector uniqueness after adding wraps.
      // ===== Prime-only campaign data =====
      // Level entries intentionally separate gameplay content fields from authoring assertions:
      // - Gameplay content: id, targetMoves, ringCycles, initial
      // - Authoring assertions (validation-only): authoring.requireWrapInIntendedPlan
      const CAMPAIGN_LEVELS = [
        { id: 1, targetMoves: 11, ringCycles: [3, 5, 3, 5, 7, 3, 5], initial: [2, 2, 1, 2, 4, 0, 2], authoring: { requireWrapInIntendedPlan: false } },
        { id: 2, targetMoves: 11, ringCycles: [5, 7, 13, 3, 2, 11, 2], initial: [0, 5, 8, 2, 0, 2, 0], authoring: { requireWrapInIntendedPlan: false } },
        { id: 3, targetMoves: 12, ringCycles: [2, 3, 5, 2, 5, 13, 19], initial: [0, 0, 3, 0, 3, 10, 5], authoring: { requireWrapInIntendedPlan: false } },
        { id: 4, targetMoves: 13, ringCycles: [2, 2, 5, 17, 17, 13, 7], initial: [0, 0, 0, 0, 6, 6, 1], authoring: { requireWrapInIntendedPlan: false } },
        { id: 5, targetMoves: 17, ringCycles: [2, 5, 5, 13, 19, 2, 17], initial: [0, 4, 2, 5, 6, 0, 15], authoring: { requireWrapInIntendedPlan: false } },
        { id: 6, targetMoves: 10, ringCycles: [3, 2, 7, 13, 5, 11, 11], initial: [0, 0, 0, 3, 0, 10, 7], authoring: { requireWrapInIntendedPlan: true } },
        { id: 7, targetMoves: 12, ringCycles: [3, 2, 13, 5, 11, 17, 2], initial: [0, 0, 12, 0, 2, 11, 0], authoring: { requireWrapInIntendedPlan: true } },
        { id: 8, targetMoves: 16, ringCycles: [5, 11, 11, 19, 3, 3, 19], initial: [2, 4, 0, 0, 0, 0, 5], authoring: { requireWrapInIntendedPlan: true } },
        { id: 9, targetMoves: 17, ringCycles: [3, 5, 17, 5, 17, 11, 13], initial: [0, 0, 5, 2, 16, 9, 10], authoring: { requireWrapInIntendedPlan: true } },
        { id: 10, targetMoves: 17, ringCycles: [3, 3, 19, 3, 7, 17, 17], initial: [0, 1, 17, 0, 0, 2, 13], authoring: { requireWrapInIntendedPlan: true } },
        { id: 11, targetMoves: 20, ringCycles: [3, 2, 17, 13, 13, 7, 19], initial: [1, 0, 13, 2, 4, 6, 13], authoring: { requireWrapInIntendedPlan: true } },
        { id: 12, targetMoves: 21, ringCycles: [3, 5, 17, 19, 5, 11, 19], initial: [1, 0, 13, 13, 2, 3, 17], authoring: { requireWrapInIntendedPlan: true } },
      ];

      const COLORS = ["#8b5cf6", "#4f46e5", "#3b82f6", "#22c55e", "#eab308", "#f97316", "#ef4444"];
      const BOARD_BACKGROUND = "#18181b";
      const BUTTON_ORDER = [6, 5, 4, 3, 2, 1, 0];
      const RING_LABELS = ["V", "I", "B", "G", "Y", "O", "R"];
      const FAVICON_RING_LAYOUT = [0, 6, 2, 4, 1, 3, 5];

      // ===== Puzzle-model helpers =====
      const normalizeState = (state, cycleLength) => ((state % cycleLength) + cycleLength) % cycleLength;
      const rotationAngle = (state, cycleLength) => (360 / cycleLength) * state;
      const GAP_HALF_WIDTH = 6;
      const RING_STROKE_WIDTH = 16 * 1.17;
      const RING_RADIUS_BASE = 8.64;
      const RING_RADIUS_STEP = 22 * 1.17;
      const DOT_CENTER_OFFSET = 13;
      const RING_TRANSFORM_CLASS = "transition-transform duration-300 ease-in-out";
      const hexToRgb = (hex) => {
        const normalized = hex.replace("#", "");
        const intValue = Number.parseInt(normalized, 16);
        return {
          r: (intValue >> 16) & 255,
          g: (intValue >> 8) & 255,
          b: intValue & 255,
        };
      };
      const markerStrokeForRing = (hexColor) => {
        const { r, g, b } = hexToRgb(hexColor);
        const luminance = (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
        return luminance > 0.58 ? "rgba(15, 23, 42, 0.378)" : "rgba(248, 250, 252, 0.45)";
      };
      const randomBoardOrientation = (level) => Math.floor(Math.random() * level.ringCycles[CENTER_RING_INDEX]);

      const prepareLevelState = (level) => ({
        rotations: [...level.initial],
        boardOrientationState: randomBoardOrientation(level),
      });

      const buildOuterRingRenderConfig = (level) => {
        return OUTER_RING_INDICES.map((ringIndex) => {
          const cycle = level.ringCycles[ringIndex];
          const radius = RING_RADIUS_BASE + RING_RADIUS_STEP * ringIndex;
          return {
            ringIndex,
            radius,
            markerRadius: radius,
            markerDotRadius: 1.58,
            markerStrokeColor: markerStrokeForRing(COLORS[ringIndex]),
            markerAngles: Array.from({ length: cycle }, (_, markerIndex) => (360 / cycle) * markerIndex),
          };
        });
      };

      const EMPTY_EXACT_SOLUTION_PLAN = { heading: "", parts: [] };
      const buildExactSolutionPlan = (level, levelSolution) => {
        if (!levelSolution?.hasExactIntendedSolution || !levelSolution.exactIntendedPlan?.selectedRingOptions) {
          return EMPTY_EXACT_SOLUTION_PLAN;
        }

        const ringParts = BUTTON_ORDER.map((ringIndex) => {
          const ringOption = levelSolution.exactIntendedPlan.selectedRingOptions[ringIndex];
          const directionText = ringOption.moveCount === 0 ? "0" : `${ringOption.moveCount} ${ringOption.direction === 1 ? "CW" : "CCW"}`;
          const wrapText = ringOption.wraps > 0 ? ` (${ringOption.wraps} additional full turn${ringOption.wraps === 1 ? "" : "s"})` : "";
          return {
            label: RING_LABELS[ringIndex],
            color: COLORS[ringIndex],
            text: `${RING_LABELS[ringIndex]}: ${directionText}${wrapText}`,
            plannedMoves: ringOption.moveCount,
          };
        });

        const plannedMoveSum = ringParts.reduce((sum, part) => sum + (part.plannedMoves || 0), 0);
        const expectedTarget = levelSolution.exactIntendedPlan.targetMoves ?? level.targetMoves;
        if (plannedMoveSum !== expectedTarget) {
          console.warn(`Exact intended solution display mismatch for level ${level.id}: planned=${plannedMoveSum}, target=${expectedTarget}.`);
        }

        return {
          heading: `${level.targetMoves}-move solution plan`,
          parts: ringParts,
        };
      };

      const isPrime = (value) => {
        if (value < 2) {
          return false;
        }
        for (let i = 2; i * i <= value; i += 1) {
          if (value % i === 0) {
            return false;
          }
        }
        return true;
      };

      // ===== Validation helpers =====
      const validateLevelCycleConstraints = (level) => {
        if (level.ringCycles.length !== RING_COUNT || level.initial.length !== RING_COUNT) {
          throw new Error(`Invalid level ${level.id}: expected ${RING_COUNT} rings and ${RING_COUNT} initial states.`);
        }

        const centerRingCycle = level.ringCycles[CENTER_RING_INDEX];
        if (!isPrime(centerRingCycle) || centerRingCycle > MAX_CENTER_RING_CYCLE) {
          throw new Error(`Invalid level ${level.id}: center ring cycle must be prime and <= ${MAX_CENTER_RING_CYCLE}.`);
        }

        const firstOuterRingCycle = level.ringCycles[FIRST_OUTER_RING_INDEX];
        if (!isPrime(firstOuterRingCycle) || firstOuterRingCycle > MAX_FIRST_OUTER_RING_CYCLE) {
          throw new Error(`Invalid level ${level.id}: first outer ring cycle must be prime and <= ${MAX_FIRST_OUTER_RING_CYCLE}.`);
        }

        const remainingOuterCycles = level.ringCycles.slice(FIRST_OUTER_RING_INDEX + 1);
        if (remainingOuterCycles.some((cycleLength) => !isPrime(cycleLength) || cycleLength > MAX_REMAINING_OUTER_RING_CYCLE)) {
          throw new Error(`Invalid level ${level.id}: remaining outer ring cycles must be prime and <= ${MAX_REMAINING_OUTER_RING_CYCLE}.`);
        }
      };

      const validateCampaignSolutions = (levels, analyses) => {
        levels.forEach((levelEntry, index) => {
          const analysis = analyses[index];
          if (!analysis.hasExactIntendedSolution) {
            const message = `Level ${levelEntry.id} targetMoves=${levelEntry.targetMoves} has no exact intended directed solution vector.`;
            if (DEV_VALIDATION) {
              throw new Error(message);
            }
            console.error(`[Validation] ${message}`);
          }
          if (analysis.hasMultipleExactIntendedSolutions) {
            console.warn(`[Validation] Level ${levelEntry.id} has ${analysis.exactIntendedSolutionVectorCount} exact intended move-allocation vectors.`);
          }
          if (levelEntry.authoring?.requireWrapInIntendedPlan && !analysis.exactPlanUsesWraps) {
            const wrapMessage = `Level ${levelEntry.id} requires a wrapped ring in its intended authoring plan, but solver's exact plan has no wrapped ring.`;
            if (DEV_VALIDATION) {
              throw new Error(wrapMessage);
            }
            console.warn(`[Validation] ${wrapMessage}`);
          }
        });
      };

      const OuterRing = React.memo(function OuterRing({ ringIndex, config, ringRotation, transformClass }) {
        return (
          <g>
            <g transform={`rotate(${ringRotation})`} className={transformClass} mask="url(#gapMask)">
              <circle cx="0" cy="0" r={config.radius} stroke={COLORS[ringIndex]} strokeWidth={RING_STROKE_WIDTH} fill="none" />
              {config.markerAngles.map((angle, markerIndex) => (
                <circle
                  key={`marker-${ringIndex}-${markerIndex}`}
                  cx="0"
                  cy={-config.markerRadius}
                  r={config.markerDotRadius}
                  transform={`rotate(${angle})`}
                  fill={config.markerStrokeColor}
                />
              ))}
            </g>
          </g>
        );
      });


      // Puzzle-model note:
      // - Logical truth is shared-spoke identity in center-ring coordinates: a level is solved when every ring maps to the same spoke.
      // - The solver and win checks reason about spoke agreement, not an absolute screen angle like "up".
      // - Levels should be authored angle-agnostic around spoke structure and exact per-ring move allocations.
      // - boardOrientationState applies a full-board render rotation on load/restart for visual freshness only.
      //   It does not alter solvability, intended vectors, or the underlying shared-spoke solution space.
      // - Internal shared-spoke choice and cosmetic board orientation are different axes; do not conflate them.
      // - Keep board rotation for this abstract radial presentation unless future angle-sensitive UI makes random orientation confusing.

      const spokeFromState = (state, cycleLength, centerCycle) => {
        const normalized = normalizeState(state, cycleLength);
        const spoke = (normalized * centerCycle) / cycleLength;
        return Number.isInteger(spoke) ? spoke % centerCycle : null;
      };

      const areAllRingsAligned = (rotations, ringCycles) => {
        const centerCycle = ringCycles[0];
        const centerSpoke = spokeFromState(rotations[0], centerCycle, centerCycle);
        return rotations.every((rotation, index) => spokeFromState(rotation, ringCycles[index], centerCycle) === centerSpoke);
      };

      const ringTargetStatesForSpoke = (cycleLength, sharedSpoke, centerCycle) => {
        const states = [];
        for (let state = 0; state < cycleLength; state += 1) {
          if (spokeFromState(state, cycleLength, centerCycle) === sharedSpoke) {
            states.push(state);
          }
        }
        return states;
      };

      // Solver design note:
      // - Valid plans are exact directed move vectors where every counted move is intentional.
      // - Over-360 motion is valid when staying in one chosen direction for that ring:
      //   moveCount = baseDirectionalDistance + wraps * cycleLength, wraps >= 0.
      // - For generator/validation workflows, prefer exactly one exact directed solution vector.
      // - Treat multiple exact vectors as a design warning unless intentional.
      // - Vector uniqueness is by full per-ring allocation, not just shared final alignment.
      // ===== Exact-solution analysis =====
      const optionDedupKey = (option) => {
        // Distinct solution vectors are identified by each ring's allocated moveCount/wraps/targetState,
        // plus direction for non-zero movement. Zero-move allocations are direction-agnostic.
        const directionKey = option.moveCount === 0 ? "stationary" : option.direction;
        return `${option.targetState}|${directionKey}|${option.moveCount}|${option.wraps}`;
      };

      const solveLevelDeterministically = (level) => {
        const candidateSpokes = [];
        const centerCycle = level.ringCycles[0];

        for (let sharedSpoke = 0; sharedSpoke < centerCycle; sharedSpoke += 1) {
          const ringDirectedOptions = [];
          let minimumDirectedMoves = 0;
          let validSpoke = true;

          for (let ringIndex = 0; ringIndex < RING_COUNT; ringIndex += 1) {
            const cycleLength = level.ringCycles[ringIndex];
            const initialState = normalizeState(level.initial[ringIndex], cycleLength);
            const targetStates = ringTargetStatesForSpoke(cycleLength, sharedSpoke, centerCycle);

            if (targetStates.length === 0) {
              validSpoke = false;
              break;
            }

            const optionsByKey = new Map();

            targetStates.forEach((targetState) => {
              const baseClockwise = normalizeState(targetState - initialState, cycleLength);
              const baseCounterClockwise = normalizeState(initialState - targetState, cycleLength);

              const directionSeeds = [{ direction: 1, baseDirectionalDistance: baseClockwise }];
              if (baseCounterClockwise !== baseClockwise || baseClockwise !== 0) {
                directionSeeds.push({ direction: -1, baseDirectionalDistance: baseCounterClockwise });
              }

              directionSeeds.forEach(({ direction, baseDirectionalDistance }) => {
                const maxWraps = Math.floor((level.targetMoves - baseDirectionalDistance) / cycleLength);
                for (let wraps = 0; wraps <= maxWraps; wraps += 1) {
                  const moveCount = baseDirectionalDistance + wraps * cycleLength;
                  if (moveCount > level.targetMoves) {
                    break;
                  }
                  const option = {
                    targetState,
                    direction,
                    moveCount,
                    cycleLength,
                    baseDirectionalDistance,
                    wraps,
                    isZeroMove: moveCount === 0,
                  };
                  const dedupKey = optionDedupKey(option);
                  if (!optionsByKey.has(dedupKey)) {
                    optionsByKey.set(dedupKey, option);
                  }
                }
              });
            });

            const options = [...optionsByKey.values()];

            if (!options.length) {
              validSpoke = false;
              break;
            }

            minimumDirectedMoves += Math.min(...options.map((option) => option.moveCount));
            ringDirectedOptions.push(options.sort((a, b) => a.moveCount - b.moveCount || a.targetState - b.targetState || b.direction - a.direction || a.wraps - b.wraps));
          }

          if (validSpoke) {
            candidateSpokes.push({ sharedSpoke, ringDirectedOptions, minimumDirectedMoves });
          }
        }

        const bestMinimumPlan = candidateSpokes.reduce((best, candidate) => {
          if (!best || candidate.minimumDirectedMoves < best.minimumDirectedMoves) {
            return candidate;
          }
          return best;
        }, null);

        // Counts unique exact move-allocation vectors across all rings for this level target.
        // Two vectors are distinct when any ring differs in targetState, moveCount, wraps,
        // or (for non-zero movement) direction.
        let exactSolutionVectorCount = 0;
        let firstExactPlan = null;

        candidateSpokes.forEach((candidate) => {
          const countDpByRing = [new Map([[0, 1]])];
          const pathDpByRing = [new Map([[0, null]])];

          for (let ringIndex = 0; ringIndex < RING_COUNT; ringIndex += 1) {
            const previousCounts = countDpByRing[ringIndex];
            const previousPaths = pathDpByRing[ringIndex];
            const nextCounts = new Map();
            const nextPaths = new Map();

            previousCounts.forEach((count, partialMoves) => {
              candidate.ringDirectedOptions[ringIndex].forEach((option) => {
                const nextMoves = partialMoves + option.moveCount;
                if (nextMoves > level.targetMoves) {
                  return;
                }
                nextCounts.set(nextMoves, (nextCounts.get(nextMoves) || 0) + count);
                if (!nextPaths.has(nextMoves)) {
                  nextPaths.set(nextMoves, { previousMoves: partialMoves, option, hasPreviousPath: previousPaths.has(partialMoves) });
                }
              });
            });

            countDpByRing.push(nextCounts);
            pathDpByRing.push(nextPaths);
          }

          const spokeExactPlanCount = countDpByRing[RING_COUNT].get(level.targetMoves) || 0;
          exactSolutionVectorCount += spokeExactPlanCount;

          if (!firstExactPlan && spokeExactPlanCount > 0) {
            const selectedRingOptions = Array(RING_COUNT).fill(null);
            let runningMoves = level.targetMoves;

            for (let ringIndex = RING_COUNT; ringIndex > 0; ringIndex -= 1) {
              const step = pathDpByRing[ringIndex].get(runningMoves);
              if (!step || !step.hasPreviousPath) {
                break;
              }
              selectedRingOptions[ringIndex - 1] = step.option;
              runningMoves = step.previousMoves;
            }

            if (selectedRingOptions.every(Boolean) && runningMoves === 0) {
              firstExactPlan = {
                sharedSpoke: candidate.sharedSpoke,
                targetMoves: level.targetMoves,
                selectedRingOptions,
              };
            }
          }
        });

        const exactPlanUsesWraps = Boolean(firstExactPlan?.selectedRingOptions?.some((option) => option.wraps > 0));

        return {
          minimumMovesToAlignment: bestMinimumPlan ? bestMinimumPlan.minimumDirectedMoves : Infinity,
          hasExactIntendedSolution: exactSolutionVectorCount > 0,
          exactIntendedPlan: firstExactPlan,
          exactPlanUsesWraps,
          // Uniqueness is based on exact per-ring move-allocation vectors, not only final alignment.
          exactIntendedSolutionVectorCount: exactSolutionVectorCount,
          hasMultipleExactIntendedSolutions: exactSolutionVectorCount > 1,
        };
      };

      const ALL_LEVEL_SOLUTIONS = CAMPAIGN_LEVELS.map((level) => solveLevelDeterministically(level));

      // ===== React app =====

      function App() {
        const [currentLevelIndex, setCurrentLevelIndex] = useState(0);
        const [rotations, setRotations] = useState(() => [...CAMPAIGN_LEVELS[0].initial]);
        const [boardOrientationState, setBoardOrientationState] = useState(() => randomBoardOrientation(CAMPAIGN_LEVELS[0]));
        const [moves, setMoves] = useState(0);
        const [history, setHistory] = useState([]);
        const [ballFired, setBallFired] = useState(false);
        const [showWinModal, setShowWinModal] = useState(false);
        const [showGuideModal, setShowGuideModal] = useState(true);
        const [message, setMessage] = useState("");
        const [showSolutionHint, setShowSolutionHint] = useState(false);
        const [isLevelReady, setIsLevelReady] = useState(false);
        const levelReadyFrameRef = useRef(null);

        const level = CAMPAIGN_LEVELS[currentLevelIndex];
        const levelSolution = ALL_LEVEL_SOLUTIONS[currentLevelIndex];
        const isAligned = areAllRingsAligned(rotations, level.ringCycles);
        const outerRingRenderConfig = useMemo(() => buildOuterRingRenderConfig(level), [level]);
        const exactSolutionPlan = useMemo(() => buildExactSolutionPlan(level, levelSolution), [level, levelSolution]);

        useEffect(() => {
          validateLevelCycleConstraints(level);
        }, [level]);

        useEffect(() => {
          validateCampaignSolutions(CAMPAIGN_LEVELS, ALL_LEVEL_SOLUTIONS);
        }, []);

        useEffect(() => {
          const svgString = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
              <defs>
                <mask id="faviconMask">
                  <rect x="0" y="0" width="360" height="360" fill="white" />
                  <rect x="174" y="0" width="12" height="190" fill="black" />
                </mask>
              </defs>
              <g transform="translate(180, 180)">
                ${COLORS.map((color, i) => {
                  const cycle = level.ringCycles[i];
                  const rot = (FAVICON_RING_LAYOUT[i] * 360) / cycle;
                  if (i === 0) {
                    return `<g transform="rotate(${rot})"><circle cx="0" cy="0" r="18" fill="${color}" mask="url(#faviconMask)"/></g>`;
                  }
                  const radius = 10 + 22 * i;
                  return `<g transform="rotate(${rot})"><circle cx="0" cy="0" r="${radius}" stroke="${color}" stroke-width="16" fill="none" mask="url(#faviconMask)"/></g>`;
                }).join("")}
              </g>
            </svg>
          `;
          const svgBlob = new Blob([svgString], { type: "image/svg+xml" });
          const url = URL.createObjectURL(svgBlob);
          let link = document.querySelector("link[rel='icon']");
          if (!link) {
            link = document.createElement("link");
            link.rel = "icon";
            document.head.appendChild(link);
          }
          link.href = url;
          return () => URL.revokeObjectURL(url);
        }, [level]);


        useEffect(() => {
          if (levelReadyFrameRef.current) {
            cancelAnimationFrame(levelReadyFrameRef.current);
          }
          levelReadyFrameRef.current = requestAnimationFrame(() => {
            setIsLevelReady(true);
            levelReadyFrameRef.current = null;
          });
          return () => {
            if (levelReadyFrameRef.current) {
              cancelAnimationFrame(levelReadyFrameRef.current);
              levelReadyFrameRef.current = null;
            }
          };
        }, [currentLevelIndex]);

        const loadLevel = useCallback((nextLevelIndex) => {
          const safeLevelIndex = ((nextLevelIndex % CAMPAIGN_LEVELS.length) + CAMPAIGN_LEVELS.length) % CAMPAIGN_LEVELS.length;
          const nextLevel = CAMPAIGN_LEVELS[safeLevelIndex];
          const nextState = prepareLevelState(nextLevel);

          setIsLevelReady(false);
          setCurrentLevelIndex(safeLevelIndex);
          setRotations(nextState.rotations);
          setBoardOrientationState(nextState.boardOrientationState);
          setMoves(0);
          setHistory([]);
          setBallFired(false);
          setShowWinModal(false);
          setShowSolutionHint(false);
          setMessage("");
        }, []);

        const handleRotate = useCallback((index, direction) => {
          if (ballFired || showWinModal || showGuideModal) return;
          setRotations((previousRotations) => {
            const nextRotations = [...previousRotations];
            nextRotations[index] += direction;
            return nextRotations;
          });
          setHistory((previousHistory) => [...previousHistory, { index, direction }]);
          setMoves((previousMoves) => previousMoves + 1);
        }, [ballFired, showWinModal, showGuideModal]);

        const undoMove = useCallback(() => {
          if (history.length === 0 || ballFired || showWinModal || showGuideModal) return;
          const lastMove = history[history.length - 1];
          setRotations((previousRotations) => {
            const nextRotations = [...previousRotations];
            nextRotations[lastMove.index] -= lastMove.direction;
            return nextRotations;
          });
          setHistory((previousHistory) => previousHistory.slice(0, -1));
          setMoves((previousMoves) => previousMoves - 1);
        }, [history, ballFired, showWinModal, showGuideModal]);

        const restartLevel = useCallback(() => {
          const nextState = prepareLevelState(level);
          setIsLevelReady(false);
          setRotations(nextState.rotations);
          setBoardOrientationState(nextState.boardOrientationState);
          setMoves(0);
          setHistory([]);
          setBallFired(false);
          setMessage("");
          setShowWinModal(false);
          setShowSolutionHint(false);
        }, [level]);

        const goToPreviousLevel = useCallback(() => {
          loadLevel(currentLevelIndex - 1);
        }, [loadLevel, currentLevelIndex]);

        const goToNextLevel = useCallback(() => {
          loadLevel(currentLevelIndex + 1);
        }, [loadLevel, currentLevelIndex]);

        const showMessage = (msg) => {
          setMessage(msg);
          setTimeout(() => setMessage(""), 3000);
        };

        const handleDotClick = () => {
          if (ballFired || showWinModal || showGuideModal) return;
          if (isAligned) {
            if (moves === level.targetMoves) {
              setBallFired(true);
              setTimeout(() => setShowWinModal(true), 700);
            } else if (moves < level.targetMoves) {
              const diff = level.targetMoves - moves;
              showMessage(`Aligned, but not at the target move count. ${diff} more move${diff !== 1 ? "s" : ""} needed.`);
            } else {
              const diff = moves - level.targetMoves;
              showMessage(`Aligned, but ${diff} move${diff !== 1 ? "s" : ""} over target.`);
            }
          } else {
            showMessage("Align all gaps with the center notch first!");
          }
        };

        return (
          <div className="min-h-screen bg-zinc-900 text-zinc-100 flex flex-col items-center justify-center p-4 select-none">
            <div className="w-full max-w-lg flex justify-between items-center mb-1.5 px-2">
              <div className="w-full flex items-center justify-between gap-4">
                <h1 className="text-xl font-bold tracking-wider text-zinc-100 uppercase">Ring Road</h1>
                <div className="flex items-center gap-2 text-sm font-medium text-right whitespace-nowrap text-zinc-100">
                  <button
                    onClick={goToPreviousLevel}
                    className="rounded-full bg-white leading-none text-sm font-bold flex items-center justify-center hover:bg-zinc-200 active:bg-zinc-300 transition-colors"
                    style={{ width: "21px", height: "21px", color: BOARD_BACKGROUND }}
                    aria-label="Previous level"
                  >
                    -
                  </button>
                  <p>
                    Level {level.id} of {CAMPAIGN_LEVELS.length}
                  </p>
                  <button
                    onClick={goToNextLevel}
                    className="rounded-full bg-white leading-none text-sm font-bold flex items-center justify-center hover:bg-zinc-200 active:bg-zinc-300 transition-colors"
                    style={{ width: "21px", height: "21px", color: BOARD_BACKGROUND }}
                    aria-label="Next level"
                  >
                    +
                  </button>
                </div>
              </div>
            </div>

            <div className="w-full max-w-lg flex justify-between items-center mb-[0.3rem] px-2">
              <div className={`text-lg font-mono font-semibold ${moves > level.targetMoves ? "text-red-400" : moves === level.targetMoves ? "text-emerald-400" : "text-zinc-300"}`}>
                Moves: {moves} / {level.targetMoves}
              </div>
              <div className="flex gap-2">
                <button onClick={undoMove} disabled={history.length === 0} className="flex items-center justify-center bg-zinc-800 hover:bg-zinc-700 disabled:opacity-50 p-2 rounded-md transition-colors text-sm" aria-label="Undo">
                  <UndoIcon />
                </button>
                <button onClick={restartLevel} className="flex items-center justify-center bg-zinc-800 hover:bg-zinc-700 p-2 rounded-md transition-colors text-sm" aria-label="Reset level">
                  <XIcon />
                </button>
              </div>
            </div>

            <div className="relative flex justify-center items-center z-20">
              {message && <div className="absolute -top-12 left-1/2 -translate-x-1/2 whitespace-nowrap bg-zinc-800 text-white px-4 py-2 rounded-full text-sm font-medium shadow-lg z-10">{message}</div>}
              {isLevelReady ? (
              <svg viewBox="0 0 360 360" className="w-full max-w-[400px] h-auto overflow-visible">
                <defs>
                  <mask id="gapMask" maskUnits="userSpaceOnUse" x="-400" y="-400" width="800" height="800">
                    <rect x="-400" y="-400" width="800" height="800" fill="white" />
                    <rect x={-GAP_HALF_WIDTH} y="-400" width={GAP_HALF_WIDTH * 2} height="390" fill="black" />
                  </mask>
                  <mask id="centerGapMask" maskUnits="userSpaceOnUse" x="-400" y="-400" width="800" height="800">
                    <rect x="-400" y="-400" width="800" height="800" fill="white" />
                    <rect x={-GAP_HALF_WIDTH} y="-400" width={GAP_HALF_WIDTH * 2} height="384" fill="black" />
                    <circle cx="0" cy="-16" r={GAP_HALF_WIDTH} fill="black" />
                  </mask>
                </defs>
                <g transform={`translate(180, 180) rotate(${rotationAngle(boardOrientationState, level.ringCycles[0])})`}>
                  {outerRingRenderConfig.map((config) => (
                    <OuterRing
                      key={`outer-${config.ringIndex}`}
                      ringIndex={config.ringIndex}
                      config={config}
                      ringRotation={rotationAngle(rotations[config.ringIndex], level.ringCycles[config.ringIndex])}
                      transformClass={RING_TRANSFORM_CLASS}
                    />
                  ))}

                  <g transform={`rotate(${rotationAngle(rotations[0], level.ringCycles[0])})`} className={RING_TRANSFORM_CLASS}>
                    <circle cx="0" cy="0" r="18" fill={COLORS[0]} mask="url(#centerGapMask)" onClick={handleDotClick} className={`cursor-pointer transition-opacity ${isAligned && moves === level.targetMoves ? "hover:opacity-80" : ""}`} />
                    {isAligned && moves === level.targetMoves && !ballFired && <circle cx="0" cy="0" r="18" fill="none" stroke="white" strokeWidth="2" className="animate-ping opacity-50 pointer-events-none" />}
                    <circle
                      cx="0"
                      cy={-DOT_CENTER_OFFSET}
                      r="4"
                      fill="#ffffff"
                      className="pointer-events-none"
                      style={{
                        filter: "drop-shadow(0 0 3px rgba(255,255,255,0.8))",
                        transform: ballFired ? "translateY(-130vh)" : "translateY(0)",
                        transition: ballFired ? "transform 0.9s cubic-bezier(0.4, 0, 0.2, 1)" : "none",
                        WebkitTransition: ballFired ? "transform 0.9s cubic-bezier(0.4, 0, 0.2, 1)" : "none",
                      }}
                    />
                  </g>
                </g>
              </svg>
              ) : (
                <div className="w-full max-w-[400px] h-[400px] flex items-center justify-center text-zinc-400 font-medium">Loading...</div>
              )}
            </div>

            <div className="flex flex-wrap justify-center gap-3 mt-[0.45rem] max-w-lg mx-auto px-4">
              {BUTTON_ORDER.map((i) => (
                <div key={`btn-${i}`} className="flex rounded-md overflow-hidden bg-zinc-800 shadow-lg" style={{ borderBottom: `2px solid ${COLORS[i]}` }}>
                  <button onClick={() => handleRotate(i, -1)} className="p-3 hover:bg-zinc-700 active:bg-zinc-600 transition-colors">
                    <RotateCcwIcon color={COLORS[i]} />
                  </button>
                  <button onClick={() => handleRotate(i, 1)} className="p-3 hover:bg-zinc-700 active:bg-zinc-600 transition-colors border-l border-white/5">
                    <RotateCwIcon color={COLORS[i]} />
                  </button>
                </div>
              ))}
            </div>

            <hr className="w-full max-w-lg mx-auto mt-6 border-zinc-700" />

            {showSolutionHint && (
              <div className="mt-4 max-w-lg mx-auto px-4 text-center text-sm font-medium text-zinc-300">
                {levelSolution.hasExactIntendedSolution ? (
                  <>
                    <p className="text-emerald-300 mb-2">{exactSolutionPlan.heading}</p>
                    <p>
                      {exactSolutionPlan.parts.map((part, index) => (
                        <React.Fragment key={part.label}>
                          <span style={{ color: part.color }}>{part.text}</span>
                          {index < exactSolutionPlan.parts.length - 1 && <span className="text-zinc-300">, </span>}
                        </React.Fragment>
                      ))}
                    </p>
                    {DEBUG_DIAGNOSTICS && levelSolution.hasMultipleExactIntendedSolutions && (
                      <p className="text-amber-300 mt-2">Diagnostic: {levelSolution.exactIntendedSolutionVectorCount} exact intended solution vectors exist for this level.</p>
                    )}
                  </>
                ) : (
                  DEBUG_DIAGNOSTICS ? <p className="text-amber-300">Diagnostic: no exact {level.targetMoves}-move solution vector found for this level.</p> : null
                )}
              </div>
            )}

            <div className="mt-4 flex justify-center gap-2">
              <button
                onClick={() => setShowGuideModal(true)}
                className="flex items-center gap-1.5 text-xs uppercase tracking-wide bg-zinc-800 hover:bg-zinc-700 text-zinc-200 px-3 py-1.5 rounded-md transition-colors"
              >
                <InfoIcon />
                guide
              </button>
              <button
                onClick={() => setShowSolutionHint((previous) => !previous)}
                className="text-xs uppercase tracking-wide bg-zinc-800 hover:bg-zinc-700 text-zinc-200 px-3 py-1.5 rounded-md transition-colors"
              >
                solution
              </button>
            </div>

            {showGuideModal && (
              <div className="fixed inset-0 bg-zinc-950/80 flex items-center justify-center z-50 p-4" style={{ backdropFilter: "blur(2px)", WebkitBackdropFilter: "blur(2px)" }}>
                <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-2xl shadow-2xl max-w-md w-full">
                  <h2 className="text-2xl font-bold text-white mb-6 text-center">How to Play Ring Road</h2>
                  <div className="space-y-4 text-zinc-300 text-sm mb-8 leading-relaxed">
                    <p>
                      <strong className="text-white">The Goal:</strong> Align the gaps in all rings and the center notch to create one straight radial road.
                    </p>
                    <p>
                      <strong className="text-white">The Catch:</strong> You must reach alignment in <span className="text-emerald-400 font-bold">exactly</span> the number of moves specified.
                    </p>
                    <p>
                      <strong className="text-indigo-400">Granularity:</strong> Rings can have different numbers of orientations, shown by the marker ticks around each ring.
                    </p>
                    <p><strong className="text-white">Route Discipline:</strong> Every move should matter. Reversing direction for extra steps will not solve the level.</p>
                    <p>Some solutions require a longer continuous route, with a ring turning past a full rotation. When aligned at the exact count, tap the center dot to fire the ball.</p>
                  </div>
                  <button onClick={() => setShowGuideModal(false)} className="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-500 transition-colors">
                    Play
                  </button>
                </div>
              </div>
            )}

            {showWinModal && (
              <div className="fixed inset-0 bg-zinc-950/80 flex items-center justify-center z-50 p-4" style={{ backdropFilter: "blur(2px)", WebkitBackdropFilter: "blur(2px)" }}>
                <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center">
                  <h2 className="text-3xl font-bold text-white mb-2">Level Complete!</h2>
                  <p className="text-zinc-400 mb-8">Aligned in exactly {moves} moves.</p>
                  <div className="flex flex-col gap-3">
                    {currentLevelIndex < CAMPAIGN_LEVELS.length - 1 ? (
                      <button onClick={() => loadLevel(currentLevelIndex + 1)} className="w-full py-3 bg-zinc-100 text-zinc-900 font-bold rounded-xl hover:bg-white">
                        Next Level
                      </button>
                    ) : (
                      <div className="w-full py-3 bg-emerald-500 text-zinc-900 font-bold rounded-xl mb-2">Grand Master!</div>
                    )}
                    <button onClick={() => setShowWinModal(false)} className="w-full py-3 bg-zinc-800 text-zinc-200 font-medium rounded-xl hover:bg-zinc-700">
                      Stay
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
