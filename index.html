<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Ring Road</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
      }
    </style>
  </head>
  <body>
    <noscript>This game requires JavaScript to run.</noscript>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
      const { useState, useEffect, useMemo, useCallback, useRef } = React;

      const RING_COUNT = 7;
      const OUTER_RING_INDICES = [1, 2, 3, 4, 5, 6];

      const MODE_NORMAL = "normal";
      const MODE_PRIMES = "primes";

      const RotateCcwIcon = ({ color }) => (
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
          <path d="M3 3v5h5" />
        </svg>
      );

      const RotateCwIcon = ({ color }) => (
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
          <path d="M21 3v5h-5" />
        </svg>
      );

      const UndoIcon = () => (
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M9 14 4 9l5-5" />
          <path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11" />
        </svg>
      );

      const XIcon = () => (
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.25" strokeLinecap="round" strokeLinejoin="round">
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </svg>
      );

      const InfoIcon = () => (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="16" x2="12" y2="12" />
          <line x1="12" y1="8" x2="12.01" y2="8" />
        </svg>
      );

      const NORMAL_LEVELS = [
        { id: 1, targetMoves: 13, ringCycles: [8, 8, 12, 4, 5, 6, 10], initial: [3, 4, 1, 3, 3, 1, 1] },
        { id: 2, targetMoves: 12, ringCycles: [8, 5, 8, 3, 12, 16, 14], initial: [1, 0, 6, 2, 4, 1, 3] },
        { id: 3, targetMoves: 12, ringCycles: [8, 2, 10, 8, 15, 5, 16], initial: [5, 1, 2, 1, 4, 1, 0] },
        { id: 4, targetMoves: 16, ringCycles: [8, 7, 6, 12, 4, 3, 8], initial: [4, 6, 2, 3, 1, 1, 4] },
        { id: 5, targetMoves: 18, ringCycles: [8, 1, 5, 10, 16, 12, 6], initial: [5, 0, 4, 5, 12, 8, 1] },
        { id: 6, targetMoves: 13, ringCycles: [8, 8, 2, 5, 6, 14, 12], initial: [2, 3, 1, 2, 0, 13, 8] },
        { id: 7, targetMoves: 24, ringCycles: [8, 3, 12, 16, 8, 10, 5], initial: [4, 0, 4, 9, 3, 6, 3] },
        { id: 8, targetMoves: 18, ringCycles: [8, 6, 4, 7, 12, 5, 15], initial: [4, 3, 3, 1, 3, 2, 4] },
        { id: 9, targetMoves: 9, ringCycles: [8, 5, 3, 6, 10, 16, 12], initial: [0, 0, 0, 3, 4, 15, 11] },
        { id: 10, targetMoves: 15, ringCycles: [8, 4, 8, 5, 14, 2, 16], initial: [5, 1, 3, 0, 6, 0, 14] },
        { id: 11, targetMoves: 20, ringCycles: [8, 8, 1, 12, 3, 6, 10], initial: [4, 2, 0, 6, 2, 4, 5] },
        { id: 12, targetMoves: 18, ringCycles: [8, 2, 5, 4, 16, 8, 12], initial: [3, 1, 0, 0, 7, 4, 9] },
      ];

      const PRIME_LEVELS = [
        { id: 1, targetMoves: 19, ringCycles: [3, 5, 17, 19, 5, 11, 19], initial: [2, 0, 4, 1, 4, 10, 10] },
        { id: 2, targetMoves: 26, ringCycles: [3, 2, 17, 13, 13, 7, 19], initial: [2, 1, 4, 10, 7, 2, 7] },
        { id: 3, targetMoves: 24, ringCycles: [3, 2, 7, 13, 5, 11, 11], initial: [2, 1, 3, 7, 4, 5, 5] },
        { id: 4, targetMoves: 19, ringCycles: [5, 11, 11, 19, 3, 3, 19], initial: [3, 0, 9, 2, 1, 2, 9] },
        { id: 5, targetMoves: 21, ringCycles: [3, 2, 13, 5, 11, 17, 2], initial: [2, 1, 7, 3, 4, 5, 0] },
        { id: 6, targetMoves: 11, ringCycles: [2, 3, 5, 2, 5, 13, 19], initial: [1, 0, 3, 0, 2, 0, 15] },
        { id: 7, targetMoves: 17, ringCycles: [3, 5, 17, 5, 17, 11, 13], initial: [2, 2, 13, 1, 15, 7, 12] },
        { id: 8, targetMoves: 12, ringCycles: [3, 3, 19, 3, 7, 17, 17], initial: [1, 0, 1, 2, 5, 1, 13] },
        { id: 9, targetMoves: 10, ringCycles: [3, 5, 3, 5, 7, 3, 5], initial: [2, 3, 0, 2, 6, 1, 4] },
        { id: 10, targetMoves: 15, ringCycles: [5, 7, 13, 3, 2, 11, 2], initial: [0, 5, 7, 1, 1, 9, 1] },
        { id: 11, targetMoves: 17, ringCycles: [2, 2, 5, 17, 17, 13, 7], initial: [1, 0, 0, 6, 11, 1, 1] },
        { id: 12, targetMoves: 20, ringCycles: [2, 5, 5, 13, 19, 2, 17], initial: [0, 1, 1, 3, 5, 1, 10] },
      ];

      const LEVELS_BY_MODE = {
        [MODE_NORMAL]: NORMAL_LEVELS,
        [MODE_PRIMES]: PRIME_LEVELS,
      };

      const COLORS = ["#8b5cf6", "#4f46e5", "#3b82f6", "#22c55e", "#eab308", "#f97316", "#ef4444"];
      const BOARD_BACKGROUND = "#18181b";
      const BUTTON_ORDER = [6, 5, 4, 3, 2, 1, 0];
      const RING_LABELS = ["V", "I", "B", "G", "Y", "O", "R"];

      const normalizeState = (state, cycleLength) => ((state % cycleLength) + cycleLength) % cycleLength;
      const rotationAngle = (state, cycleLength) => (360 / cycleLength) * state;
      const GAP_HALF_WIDTH = 6;
      const RING_STROKE_WIDTH = 16 * 1.17;
      const RING_RADIUS_BASE = 8.64;
      const RING_RADIUS_STEP = 22 * 1.17;
      const DOT_CENTER_OFFSET = 13;
      const RING_TRANSFORM_CLASS = "transition-transform duration-300 ease-in-out";
      const hexToRgb = (hex) => {
        const normalized = hex.replace("#", "");
        const intValue = Number.parseInt(normalized, 16);
        return {
          r: (intValue >> 16) & 255,
          g: (intValue >> 8) & 255,
          b: intValue & 255,
        };
      };
      const markerStrokeForRing = (hexColor) => {
        const { r, g, b } = hexToRgb(hexColor);
        const luminance = (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
        return luminance > 0.58 ? "rgba(15, 23, 42, 0.378)" : "rgba(248, 250, 252, 0.45)";
      };

      const isPrime = (value) => {
        if (value < 2) {
          return false;
        }
        for (let i = 2; i * i <= value; i += 1) {
          if (value % i === 0) {
            return false;
          }
        }
        return true;
      };

      const OuterRing = React.memo(function OuterRing({ ringIndex, config, ringRotation, transformClass }) {
        return (
          <g>
            <g transform={`rotate(${ringRotation})`} className={transformClass} mask="url(#gapMask)">
              <circle cx="0" cy="0" r={config.radius} stroke={COLORS[ringIndex]} strokeWidth={RING_STROKE_WIDTH} fill="none" />
              {config.markerAngles.map((angle, markerIndex) => (
                <circle
                  key={`marker-${ringIndex}-${markerIndex}`}
                  cx="0"
                  cy={-config.markerRadius}
                  r={config.markerDotRadius}
                  transform={`rotate(${angle})`}
                  fill={config.markerStrokeColor}
                />
              ))}
            </g>
          </g>
        );
      });

      const spokeFromState = (state, cycleLength, centerCycle) => {
        const normalized = normalizeState(state, cycleLength);
        const spoke = (normalized * centerCycle) / cycleLength;
        return Number.isInteger(spoke) ? spoke % centerCycle : null;
      };

      const areAllRingsAligned = (rotations, ringCycles) => {
        const centerCycle = ringCycles[0];
        const centerSpoke = spokeFromState(rotations[0], centerCycle, centerCycle);
        return rotations.every((rotation, index) => spokeFromState(rotation, ringCycles[index], centerCycle) === centerSpoke);
      };

      const ringTargetStatesForSpoke = (cycleLength, sharedSpoke, centerCycle) => {
        const states = [];
        for (let state = 0; state < cycleLength; state += 1) {
          if (spokeFromState(state, cycleLength, centerCycle) === sharedSpoke) {
            states.push(state);
          }
        }
        return states;
      };

      const solveLevelDeterministically = (level) => {
        const candidateSpokePlans = [];

        const centerCycle = level.ringCycles[0];
        for (let sharedSpoke = 0; sharedSpoke < centerCycle; sharedSpoke += 1) {
          const ringOptions = [];
          let minMoveSum = 0;
          let validSpoke = true;

          for (let ringIndex = 0; ringIndex < RING_COUNT; ringIndex += 1) {
            const cycleLength = level.ringCycles[ringIndex];
            const initialState = normalizeState(level.initial[ringIndex], cycleLength);
            const targetStates = ringTargetStatesForSpoke(cycleLength, sharedSpoke, centerCycle);

            if (targetStates.length === 0) {
              validSpoke = false;
              break;
            }

            const optionsByDistance = new Map();

            targetStates.forEach((targetState) => {
              const clockwiseSteps = normalizeState(targetState - initialState, cycleLength);
              const counterClockwiseSteps = normalizeState(initialState - targetState, cycleLength);
              const shortestDistance = Math.min(clockwiseSteps, counterClockwiseSteps);
              const shortestDirection = clockwiseSteps < counterClockwiseSteps ? 1 : -1;

              if (!optionsByDistance.has(shortestDistance)) {
                optionsByDistance.set(shortestDistance, {
                  targetState,
                  distance: shortestDistance,
                  direction: shortestDirection,
                });
              }
            });

            const sortedOptions = [...optionsByDistance.values()].sort((a, b) => a.distance - b.distance || a.targetState - b.targetState);
            ringOptions.push(sortedOptions);
            minMoveSum += sortedOptions[0].distance;
          }

          if (validSpoke) {
            candidateSpokePlans.push({ sharedSpoke, ringOptions, minMoveSum });
          }
        }

        const bestMinPlan = candidateSpokePlans.reduce((best, candidate) => {
          if (!best || candidate.minMoveSum < best.minMoveSum) {
            return candidate;
          }
          return best;
        }, null);

        const solvedPlans = [];

        candidateSpokePlans.forEach((candidate) => {
          const dpByRing = [new Map([[0, null]])];

          for (let ringIndex = 0; ringIndex < RING_COUNT; ringIndex += 1) {
            const previous = dpByRing[ringIndex];
            const next = new Map();

            previous.forEach((_, partialMoves) => {
              candidate.ringOptions[ringIndex].forEach((option) => {
                const nextMoves = partialMoves + option.distance;
                if (nextMoves <= level.targetMoves && !next.has(nextMoves)) {
                  next.set(nextMoves, { previousMoves: partialMoves, option });
                }
              });
            });

            dpByRing.push(next);
          }

          const exactBaseMoves = dpByRing[RING_COUNT].has(level.targetMoves) ? level.targetMoves : null;
          const fallbackBaseMoves = [...dpByRing[RING_COUNT].keys()]
            .filter((baseMoves) => baseMoves < level.targetMoves && (level.targetMoves - baseMoves) % 2 === 0)
            .sort((a, b) => b - a)[0];
          const chosenBaseMoves = exactBaseMoves ?? fallbackBaseMoves;

          if (chosenBaseMoves == null) {
            return;
          }
          const selectedRingOptions = Array(RING_COUNT).fill(null);
          let runningMoves = chosenBaseMoves;

          for (let ringIndex = RING_COUNT; ringIndex > 0; ringIndex -= 1) {
            const step = dpByRing[ringIndex].get(runningMoves);
            selectedRingOptions[ringIndex - 1] = step.option;
            runningMoves = step.previousMoves;
          }

          solvedPlans.push({
            sharedSpoke: candidate.sharedSpoke,
            minMoveSum: candidate.minMoveSum,
            baseMoves: chosenBaseMoves,
            extraBurnMoves: level.targetMoves - chosenBaseMoves,
            targetMoves: level.targetMoves,
            selectedRingOptions,
          });
        });

        solvedPlans.sort((a, b) => a.baseMoves - b.baseMoves || a.sharedSpoke - b.sharedSpoke);

        return {
          minimumMovesToAlignment: bestMinPlan ? bestMinPlan.minMoveSum : Infinity,
          hasExactTargetSolution: solvedPlans.length > 0,
          exactTargetPlan: solvedPlans[0] || null,
        };
      };

      const ALL_LEVEL_SOLUTIONS_BY_MODE = {
        [MODE_NORMAL]: NORMAL_LEVELS.map((level) => solveLevelDeterministically(level)),
        [MODE_PRIMES]: PRIME_LEVELS.map((level) => solveLevelDeterministically(level)),
      };

      function App() {
        const [mode, setMode] = useState(MODE_NORMAL);
        const [currentLevelIndex, setCurrentLevelIndex] = useState(0);
        const [rotations, setRotations] = useState([...LEVELS_BY_MODE[MODE_NORMAL][0].initial]);
        const [boardOrientationState, setBoardOrientationState] = useState(() => Math.floor(Math.random() * LEVELS_BY_MODE[MODE_NORMAL][0].ringCycles[0]));
        const [moves, setMoves] = useState(0);
        const [history, setHistory] = useState([]);
        const [ballFired, setBallFired] = useState(false);
        const [showWinModal, setShowWinModal] = useState(false);
        const [showGuideModal, setShowGuideModal] = useState(true);
        const [message, setMessage] = useState("");
        const [showSolutionHint, setShowSolutionHint] = useState(false);
        const [isLevelReady, setIsLevelReady] = useState(false);
        const levelReadyFrameRef = useRef(null);

        const levels = LEVELS_BY_MODE[mode];
        const level = levels[currentLevelIndex];
        const levelSolution = ALL_LEVEL_SOLUTIONS_BY_MODE[mode][currentLevelIndex];
        const isAligned = areAllRingsAligned(rotations, level.ringCycles);
        const outerRingRenderConfig = useMemo(() => {
          return OUTER_RING_INDICES.map((ringIndex) => {
            const cycle = level.ringCycles[ringIndex];
            const radius = RING_RADIUS_BASE + RING_RADIUS_STEP * ringIndex;
            return {
              ringIndex,
              radius,
              markerRadius: radius,
              markerDotRadius: 1.58,
              markerStrokeColor: markerStrokeForRing(COLORS[ringIndex]),
              markerAngles: Array.from({ length: cycle }, (_, markerIndex) => (360 / cycle) * markerIndex),
            };
          });
        }, [level]);
        const solutionHintParts = useMemo(() => {
          return BUTTON_ORDER.map((ringIndex) => {
            const cycle = level.ringCycles[ringIndex];
            const initial = normalizeState(level.initial[ringIndex], cycle);
            let ccwMoves = initial;
            let cwMoves = (cycle - initial) % cycle;

            if (ccwMoves <= cwMoves) {
              return { label: RING_LABELS[ringIndex], color: COLORS[ringIndex], text: `${ccwMoves}${ccwMoves === 0 ? "" : " CCW"}` };
            }

            return { label: RING_LABELS[ringIndex], color: COLORS[ringIndex], text: `${cwMoves} CW` };
          });
        }, [level]);
        const exactSolutionPlan = useMemo(() => {
          if (!levelSolution?.hasExactTargetSolution || !levelSolution.exactTargetPlan?.selectedRingOptions) {
            return { heading: "", parts: [] };
          }

          const ringParts = BUTTON_ORDER.map((ringIndex) => {
            const ringOption = levelSolution.exactTargetPlan.selectedRingOptions[ringIndex];
            const directionText = ringOption.distance === 0 ? "0" : `${ringOption.distance} ${ringOption.direction === 1 ? "CW" : "CCW"}`;
            return {
              label: RING_LABELS[ringIndex],
              color: COLORS[ringIndex],
              text: `${RING_LABELS[ringIndex]}: ${directionText}`,
              plannedMoves: ringOption.distance,
            };
          });

          const burnMoves = levelSolution.exactTargetPlan.extraBurnMoves ?? 0;
          const parts = [...ringParts];
          let heading = `Exact ${level.targetMoves}-move solution`;

          if (burnMoves > 0) {
            const burnPairCount = burnMoves / 2;
            parts.push({
              label: "burn",
              color: "#eab308",
              text: `Any ring: ${burnPairCount} CW + ${burnPairCount} CCW`,
              plannedMoves: burnMoves,
            });
            heading = `Target-move plan (includes burn moves)`;
          }

          const plannedMoveSum = parts.reduce((sum, part) => sum + (part.plannedMoves || 0), 0);
          const expectedTarget = levelSolution.exactTargetPlan.targetMoves ?? level.targetMoves;
          if (plannedMoveSum !== expectedTarget) {
            console.warn(
              `Exact solution display mismatch for level ${level.id}: planned=${plannedMoveSum}, target=${expectedTarget}.`
            );
          }

          return { heading, parts };
        }, [levelSolution]);

        useEffect(() => {
          if (level.ringCycles.length !== RING_COUNT || level.initial.length !== RING_COUNT) {
            throw new Error(`Invalid level ${level.id}: expected ${RING_COUNT} rings and ${RING_COUNT} initial states.`);
          }

          if (mode === MODE_NORMAL) {
            if (level.ringCycles[0] !== 8) {
              throw new Error(`Invalid normal level ${level.id}: center cycle must be 8.`);
            }
            const outerCycles = level.ringCycles.slice(1);
            if (outerCycles.some((cycleLength) => cycleLength > 16)) {
              throw new Error(`Invalid normal level ${level.id}: outer rings must have <= 16 orientations.`);
            }
            if (level.ringCycles[1] > 8) {
              throw new Error(`Invalid normal level ${level.id}: indigo ring must have <= 8 orientations.`);
            }
            if (level.ringCycles[2] > 12) {
              throw new Error(`Invalid normal level ${level.id}: blue ring must have <= 12 orientations.`);
            }
            return;
          }

          if (!isPrime(level.ringCycles[0]) || level.ringCycles[0] > 5) {
            throw new Error(`Invalid prime level ${level.id}: center cycle must be prime and <= 5.`);
          }
          if (!isPrime(level.ringCycles[1]) || level.ringCycles[1] > 11) {
            throw new Error(`Invalid prime level ${level.id}: indigo ring cycle must be prime and <= 11.`);
          }
          const otherOuterCycles = level.ringCycles.slice(2);
          if (otherOuterCycles.some((cycleLength) => !isPrime(cycleLength) || cycleLength > 19)) {
            throw new Error(`Invalid prime level ${level.id}: blue/green/yellow/orange/red cycles must be prime and <= 19.`);
          }
        }, [level, mode]);

        useEffect(() => {
          Object.entries(LEVELS_BY_MODE).forEach(([modeKey, levelsForMode]) => {
            levelsForMode.forEach((levelEntry, index) => {
              const analysis = ALL_LEVEL_SOLUTIONS_BY_MODE[modeKey][index];
              if (!analysis.hasExactTargetSolution) {
                throw new Error(`Mode=${modeKey} level ${levelEntry.id} targetMoves=${levelEntry.targetMoves} is unreachable.`);
              }
            });
          });
        }, []);

        useEffect(() => {
          const layout = [0, 6, 2, 4, 1, 3, 5];
          const svgString = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
              <defs>
                <mask id="faviconMask">
                  <rect x="0" y="0" width="360" height="360" fill="white" />
                  <rect x="174" y="0" width="12" height="190" fill="black" />
                </mask>
              </defs>
              <g transform="translate(180, 180)">
                ${COLORS.map((color, i) => {
                  const cycle = level.ringCycles[i];
                  const rot = (layout[i] * 360) / cycle;
                  if (i === 0) {
                    return `<g transform="rotate(${rot})"><circle cx="0" cy="0" r="18" fill="${color}" mask="url(#faviconMask)"/></g>`;
                  }
                  const radius = 10 + 22 * i;
                  return `<g transform="rotate(${rot})"><circle cx="0" cy="0" r="${radius}" stroke="${color}" stroke-width="16" fill="none" mask="url(#faviconMask)"/></g>`;
                }).join("")}
              </g>
            </svg>
          `;
          const svgBlob = new Blob([svgString], { type: "image/svg+xml" });
          const url = URL.createObjectURL(svgBlob);
          let link = document.querySelector("link[rel='icon']");
          if (!link) {
            link = document.createElement("link");
            link.rel = "icon";
            document.head.appendChild(link);
          }
          link.href = url;
          return () => URL.revokeObjectURL(url);
        }, [level]);


        useEffect(() => {
          if (levelReadyFrameRef.current) {
            cancelAnimationFrame(levelReadyFrameRef.current);
          }
          levelReadyFrameRef.current = requestAnimationFrame(() => {
            setIsLevelReady(true);
            levelReadyFrameRef.current = null;
          });
          return () => {
            if (levelReadyFrameRef.current) {
              cancelAnimationFrame(levelReadyFrameRef.current);
              levelReadyFrameRef.current = null;
            }
          };
        }, [mode, currentLevelIndex]);

        const loadLevel = useCallback((nextMode, nextLevelIndex) => {
          const nextLevels = LEVELS_BY_MODE[nextMode];
          const safeLevelIndex = ((nextLevelIndex % nextLevels.length) + nextLevels.length) % nextLevels.length;
          const nextLevel = nextLevels[safeLevelIndex];

          setIsLevelReady(false);
          setMode(nextMode);
          setCurrentLevelIndex(safeLevelIndex);
          setRotations([...nextLevel.initial]);
          setBoardOrientationState(Math.floor(Math.random() * nextLevel.ringCycles[0]));
          setMoves(0);
          setHistory([]);
          setBallFired(false);
          setShowWinModal(false);
          setShowSolutionHint(false);
          setMessage("");
        }, []);

        const handleRotate = useCallback((index, direction) => {
          if (ballFired || showWinModal || showGuideModal) return;
          setRotations((previousRotations) => {
            const nextRotations = [...previousRotations];
            nextRotations[index] += direction;
            return nextRotations;
          });
          setHistory((previousHistory) => [...previousHistory, { index, direction }]);
          setMoves((previousMoves) => previousMoves + 1);
        }, [ballFired, showWinModal, showGuideModal, level]);

        const undoMove = useCallback(() => {
          if (history.length === 0 || ballFired || showWinModal || showGuideModal) return;
          const lastMove = history[history.length - 1];
          setRotations((previousRotations) => {
            const nextRotations = [...previousRotations];
            nextRotations[lastMove.index] -= lastMove.direction;
            return nextRotations;
          });
          setHistory((previousHistory) => previousHistory.slice(0, -1));
          setMoves((previousMoves) => previousMoves - 1);
        }, [history, ballFired, showWinModal, showGuideModal, level]);

        const restartLevel = useCallback(() => {
          setIsLevelReady(false);
          setRotations([...level.initial]);
          setBoardOrientationState(Math.floor(Math.random() * level.ringCycles[0]));
          setMoves(0);
          setHistory([]);
          setBallFired(false);
          setMessage("");
          setShowWinModal(false);
          setShowSolutionHint(false);
        }, [level]);

        const goToPreviousLevel = useCallback(() => {
          loadLevel(mode, currentLevelIndex - 1);
        }, [loadLevel, mode, currentLevelIndex]);

        const goToNextLevel = useCallback(() => {
          loadLevel(mode, currentLevelIndex + 1);
        }, [loadLevel, mode, currentLevelIndex]);

        const showMessage = (msg) => {
          setMessage(msg);
          setTimeout(() => setMessage(""), 3000);
        };

        const handleDotClick = () => {
          if (ballFired || showWinModal || showGuideModal) return;
          if (isAligned) {
            if (moves === level.targetMoves) {
              setBallFired(true);
              setTimeout(() => setShowWinModal(true), 700);
            } else if (moves < level.targetMoves) {
              const diff = level.targetMoves - moves;
              showMessage(`Aligned! But you need to burn ${diff} more move${diff !== 1 ? "s" : ""}.`);
            } else {
              const diff = moves - level.targetMoves;
              showMessage(`Aligned! But you are ${diff} move${diff !== 1 ? "s" : ""} over the target.`);
            }
          } else {
            showMessage("Align all gaps with the center notch first!");
          }
        };

        return (
          <div className="min-h-screen bg-zinc-900 text-zinc-100 flex flex-col items-center justify-center p-4 select-none">
            <div className="w-full max-w-lg flex justify-between items-center mb-1.5 px-2">
              <div className="w-full flex items-center justify-between gap-4">
                <h1 className="text-xl font-bold tracking-wider text-zinc-100 uppercase">Ring Road</h1>
                <div className="flex items-center gap-2 text-sm font-medium text-right whitespace-nowrap text-zinc-100">
                  <button
                    onClick={goToPreviousLevel}
                    className="rounded-full bg-white leading-none text-sm font-bold flex items-center justify-center hover:bg-zinc-200 active:bg-zinc-300 transition-colors"
                    style={{ width: "21px", height: "21px", color: BOARD_BACKGROUND }}
                    aria-label="Previous level"
                  >
                    -
                  </button>
                  <p>
                    Level {level.id} of {levels.length}
                  </p>
                  <button
                    onClick={goToNextLevel}
                    className="rounded-full bg-white leading-none text-sm font-bold flex items-center justify-center hover:bg-zinc-200 active:bg-zinc-300 transition-colors"
                    style={{ width: "21px", height: "21px", color: BOARD_BACKGROUND }}
                    aria-label="Next level"
                  >
                    +
                  </button>
                </div>
              </div>
            </div>

            <div className="w-full max-w-lg flex justify-between items-center mb-[0.3rem] px-2">
              <div className={`text-lg font-mono font-semibold ${moves > level.targetMoves ? "text-red-400" : moves === level.targetMoves ? "text-emerald-400" : "text-zinc-300"}`}>
                Moves: {moves} / {level.targetMoves}
              </div>
              <div className="flex gap-2">
                <button onClick={undoMove} disabled={history.length === 0} className="flex items-center justify-center bg-zinc-800 hover:bg-zinc-700 disabled:opacity-50 p-2 rounded-md transition-colors text-sm" aria-label="Undo">
                  <UndoIcon />
                </button>
                <button onClick={restartLevel} className="flex items-center justify-center bg-zinc-800 hover:bg-zinc-700 p-2 rounded-md transition-colors text-sm" aria-label="Reset level">
                  <XIcon />
                </button>
              </div>
            </div>

            <div className="relative flex justify-center items-center z-20">
              {message && <div className="absolute -top-12 left-1/2 -translate-x-1/2 whitespace-nowrap bg-zinc-800 text-white px-4 py-2 rounded-full text-sm font-medium shadow-lg z-10">{message}</div>}
              {isLevelReady ? (
              <svg viewBox="0 0 360 360" className="w-full max-w-[400px] h-auto overflow-visible">
                <defs>
                  <mask id="gapMask" maskUnits="userSpaceOnUse" x="-400" y="-400" width="800" height="800">
                    <rect x="-400" y="-400" width="800" height="800" fill="white" />
                    <rect x={-GAP_HALF_WIDTH} y="-400" width={GAP_HALF_WIDTH * 2} height="390" fill="black" />
                  </mask>
                  <mask id="centerGapMask" maskUnits="userSpaceOnUse" x="-400" y="-400" width="800" height="800">
                    <rect x="-400" y="-400" width="800" height="800" fill="white" />
                    <rect x={-GAP_HALF_WIDTH} y="-400" width={GAP_HALF_WIDTH * 2} height="384" fill="black" />
                    <circle cx="0" cy="-16" r={GAP_HALF_WIDTH} fill="black" />
                  </mask>
                </defs>
                <g transform={`translate(180, 180) rotate(${rotationAngle(boardOrientationState, level.ringCycles[0])})`}>
                  {outerRingRenderConfig.map((config) => (
                    <OuterRing
                      key={`outer-${config.ringIndex}`}
                      ringIndex={config.ringIndex}
                      config={config}
                      ringRotation={rotationAngle(rotations[config.ringIndex], level.ringCycles[config.ringIndex])}
                      transformClass={RING_TRANSFORM_CLASS}
                    />
                  ))}

                  <g transform={`rotate(${rotationAngle(rotations[0], level.ringCycles[0])})`} className={RING_TRANSFORM_CLASS}>
                    <circle cx="0" cy="0" r="18" fill={COLORS[0]} mask="url(#centerGapMask)" onClick={handleDotClick} className={`cursor-pointer transition-opacity ${isAligned && moves === level.targetMoves ? "hover:opacity-80" : ""}`} />
                    {isAligned && moves === level.targetMoves && !ballFired && <circle cx="0" cy="0" r="18" fill="none" stroke="white" strokeWidth="2" className="animate-ping opacity-50 pointer-events-none" />}
                    <circle
                      cx="0"
                      cy={-DOT_CENTER_OFFSET}
                      r="4"
                      fill="#ffffff"
                      className="pointer-events-none"
                      style={{
                        filter: "drop-shadow(0 0 3px rgba(255,255,255,0.8))",
                        transform: ballFired ? "translateY(-130vh)" : "translateY(0)",
                        transition: ballFired ? "transform 0.9s cubic-bezier(0.4, 0, 0.2, 1)" : "none",
                        WebkitTransition: ballFired ? "transform 0.9s cubic-bezier(0.4, 0, 0.2, 1)" : "none",
                      }}
                    />
                  </g>
                </g>
              </svg>
              ) : (
                <div className="w-full max-w-[400px] h-[400px] flex items-center justify-center text-zinc-400 font-medium">Loading...</div>
              )}
            </div>

            <div className="flex flex-wrap justify-center gap-3 mt-[0.45rem] max-w-lg mx-auto px-4">
              {BUTTON_ORDER.map((i) => (
                <div key={`btn-${i}`} className="flex rounded-md overflow-hidden bg-zinc-800 shadow-lg" style={{ borderBottom: `2px solid ${COLORS[i]}` }}>
                  <button onClick={() => handleRotate(i, -1)} className="p-3 hover:bg-zinc-700 active:bg-zinc-600 transition-colors">
                    <RotateCcwIcon color={COLORS[i]} />
                  </button>
                  <button onClick={() => handleRotate(i, 1)} className="p-3 hover:bg-zinc-700 active:bg-zinc-600 transition-colors border-l border-white/5">
                    <RotateCwIcon color={COLORS[i]} />
                  </button>
                </div>
              ))}
            </div>

            <hr className="w-full max-w-lg mx-auto mt-6 border-zinc-700" />

            {showSolutionHint && (
              <div className="mt-4 max-w-lg mx-auto px-4 text-center text-sm font-medium text-zinc-300">
                {levelSolution.hasExactTargetSolution ? (
                  <>
                    <p className="text-emerald-300 mb-2">{exactSolutionPlan.heading}</p>
                    <p>
                      {exactSolutionPlan.parts.map((part, index) => (
                        <React.Fragment key={part.label}>
                          <span style={{ color: part.color }}>{part.text}</span>
                          {index < exactSolutionPlan.parts.length - 1 && <span className="text-zinc-300">, </span>}
                        </React.Fragment>
                      ))}
                    </p>
                  </>
                ) : (
                  <>
                    <p className="text-amber-300 mb-2">Per-ring reset hint (not target-move solution)</p>
                    {solutionHintParts.map((part, index) => (
                      <React.Fragment key={part.label}>
                        <span style={{ color: part.color }}>{part.label}: {part.text}</span>
                        {index < solutionHintParts.length - 1 && <span className="text-zinc-300">, </span>}
                      </React.Fragment>
                    ))}
                  </>
                )}
              </div>
            )}

            <div className="mt-4 flex justify-center gap-2">
              <button
                onClick={() => {
                  const nextMode = mode === MODE_NORMAL ? MODE_PRIMES : MODE_NORMAL;
                  loadLevel(nextMode, 0);
                }}
                className="text-xs uppercase tracking-wide bg-zinc-800 hover:bg-zinc-700 text-zinc-200 px-3 py-1.5 rounded-md transition-colors"
              >
                {mode === MODE_NORMAL ? "primes" : "normal"}
              </button>
              <button
                onClick={() => setShowGuideModal(true)}
                className="flex items-center gap-1.5 text-xs uppercase tracking-wide bg-zinc-800 hover:bg-zinc-700 text-zinc-200 px-3 py-1.5 rounded-md transition-colors"
              >
                <InfoIcon />
                guide
              </button>
              <button
                onClick={() => setShowSolutionHint((previous) => !previous)}
                className="text-xs uppercase tracking-wide bg-zinc-800 hover:bg-zinc-700 text-zinc-200 px-3 py-1.5 rounded-md transition-colors"
              >
                solution
              </button>
            </div>

            {showGuideModal && (
              <div className="fixed inset-0 bg-zinc-950/80 flex items-center justify-center z-50 p-4" style={{ backdropFilter: "blur(2px)", WebkitBackdropFilter: "blur(2px)" }}>
                <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-2xl shadow-2xl max-w-md w-full">
                  <h2 className="text-2xl font-bold text-white mb-6 text-center">How to Play Ring Road</h2>
                  <div className="space-y-4 text-zinc-300 text-sm mb-8 leading-relaxed">
                    <p>
                      <strong className="text-white">The Goal:</strong> Align the gaps in all rings and the center notch to create one straight radial road.
                    </p>
                    <p>
                      <strong className="text-white">The Catch:</strong> You must reach alignment in <span className="text-emerald-400 font-bold">exactly</span> the number of moves specified.
                    </p>
                    <p>
                      <strong className="text-indigo-400">Granularity:</strong> The center and outer rings can have different orientation counts depending on mode, shown by the marker ticks around each ring.
                    </p>
                    <p>When aligned at the right count, tap the center dot to fire the ball.</p>
                  </div>
                  <button onClick={() => setShowGuideModal(false)} className="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-500 transition-colors">
                    Play
                  </button>
                </div>
              </div>
            )}

            {showWinModal && (
              <div className="fixed inset-0 bg-zinc-950/80 flex items-center justify-center z-50 p-4" style={{ backdropFilter: "blur(2px)", WebkitBackdropFilter: "blur(2px)" }}>
                <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center">
                  <h2 className="text-3xl font-bold text-white mb-2">Level Complete!</h2>
                  <p className="text-zinc-400 mb-8">Aligned in exactly {moves} moves.</p>
                  <div className="flex flex-col gap-3">
                    {currentLevelIndex < levels.length - 1 ? (
                      <button onClick={() => loadLevel(mode, currentLevelIndex + 1)} className="w-full py-3 bg-zinc-100 text-zinc-900 font-bold rounded-xl hover:bg-white">
                        Next Level
                      </button>
                    ) : (
                      <div className="w-full py-3 bg-emerald-500 text-zinc-900 font-bold rounded-xl mb-2">Grand Master!</div>
                    )}
                    <button onClick={() => setShowWinModal(false)} className="w-full py-3 bg-zinc-800 text-zinc-200 font-medium rounded-xl hover:bg-zinc-700">
                      Stay
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
